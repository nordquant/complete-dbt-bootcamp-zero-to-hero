models:
  - name: dim_listings_cleansed
    description: Cleansed table which contains Airbnb listings.
    data_tests:
      - minimum_row_count:
          # passing arguments
          arguments:
            min_row_count: 1000
          # don't fail the test
          config:
            severity: error
    columns:
      - name: listing_id
        description: Primary key for the listing.
        data_tests:
          - unique
          - not_null
      - name: host_id
        description: The hosts's id. References the host table.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id
      - name: room_type
        description: Type of the apartment / room.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - "Entire home/apt"
                  - "Private room"
                  - "Shared room"
                  - "Hotel room"
      - name: minimum_nights
        # jinja syntax to refer to document defined in another md file
        description: '{{ doc("dim_listing_cleansed__minimum_nights") }}'
        data_tests:
          - positive_values
  - name: dim_hosts_cleansed
    description: replace empty hosts name with a value
    config:
      contract:
        enforced: true
    columns:
      - name: host_id
        data_type: integer
        data_tests:
          - not_null
          - unique
      - name: host_name
        data_type: string
        data_tests:
          - not_null
      - name: is_superhost
        data_type: string
        data_tests:
          - accepted_values:
              arguments:
                values: ['t', 'f']
      - name: updated_at
        data_type: timestamp
      - name: created_at
        data_type: timestamp
  - name: dim_listings_w_hosts
    tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          arguments:
            compare_model: source('airbnb', 'listings')
    columns:
      - name: price
        tests:
          - dbt_expectations.expect_column_quantile_values_to_be_between:
              arguments:
                quantile: .99
                min_value: 50
                max_value: 500
          - dbt_expectations.expect_column_max_to_be_between:
              arguments:
                # change it to 5000 then you can see 1 entry and warning of test failure!
                max_value: 8000
                config:
                  severity: warn
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: number
