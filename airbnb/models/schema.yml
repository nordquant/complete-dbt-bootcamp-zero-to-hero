version: 2

models:
  - name: dim_listings_cleansed
    description: Cleansed table which conntains Airbnb listings.
    data_tests:
      - minimum_row_count:
          arguments:
            min_row_count: 10000
     
    columns:

      - name: listing_id
        description: Primary key for the listing
        data_tests:
          - unique
          - not_null

      - name: host_id
        description: The hosts's id. References the host table.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id

      - name: room_type
        description: Type of the apartment / room
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - 'Entire home/apt'
                  - 'Private room'
                  - 'Shared room'
                  - 'Hotel room'
        
      - name: minimum_nights
        description: '{{ doc("dim_listing_cleansed_minimum_nights") }}'
        data_tests:
          - positive_values

  - name: dim_hosts_cleansed

    versions:
      - v: 1
        defined_in: dim_hosts_cleansed
        deprecation_date: 2030-01-01
      - v: 2
        columns:
          - include: '*'
            exclude: [host_name]
          - name: host_name
            description: The name of the host (N/A if not available)
            data_type: string
            constraints:
              - type: not_null
        defined_in: dim_hosts_cleansed_v2
    latest_version: 2

    description: Cleansed table containing Airbnb hosts information.

    config:
      contract:
        enforced: true

    columns:

      - name: host_id
        description: Unique identifier for the host.
        data_type: integer
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null

      - name: host_name
        description: Name of the host.
        data_type: string
        constraints:
          - type: not_null
        data_tests:
          - not_null

      - name: is_superhost
        description: Indicates whether the host is a superhost.
        data_type: string
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - 't'
                  - 'f'

      - name: created_at
        description: Timestamp when the host record was created.
        data_type: timestamp

      - name: updated_at
        description: Timestamp when the host record was last updated.
        data_type: timestamp


  - name: dim_listings_w_host

    data_tests:
      - dbt_expectations.expect_table_row_count_to_equal_other_table:
          arguments:
            compare_model: source('airbnb', 'listings')

    columns:

      - name: price 
        data_tests:  
          - dbt_expectations.expect_column_quantile_values_to_be_between:
              arguments:
                quantile: .99
                min_value: 50
                max_value: 5000

          - dbt_expectations.expect_column_max_to_be_between:
              arguments:
                max_value: 15000 
                config:
                  severity: warn

          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: number