version: 2

models:
  - name: dim_listings_cleansed

    data_tests:
      - minimum_row_count:
          arguments:
            min_row_count: 10000000
     
    columns:

      - name: listing_id
        data_tests:
          - unique
          - not_null

      - name: host_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id

      - name: room_type
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - 'Entire home/apt'
                  - 'Private room'
                  - 'Shared room'
                  - 'Hotel room'
        
      - name: minimum_nights
        data_tests:
          - positive_values

  - name: dim_hosts_cleansed

    config:
      contract:
        enforced: true

    columns:

      - name: host_id
        data_type: integer
        constraints:
          - type: not_null
        data_tests:
          - unique
          - not_null

      - name: host_name
        data_type: string
        constraints:
          - type: not_null
        data_tests:
          - not_null

      - name: is_superhost
        data_type: string
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - 't'
                  - 'f'
      
      - name: created_at
        data_type: timestamp
      - name: updated_at
        data_type: timestamp