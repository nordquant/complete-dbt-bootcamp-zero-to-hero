name: Staging build (uploads target as artifact)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: dbt build --target staging
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_ACCOUNT:      ${{ secrets.SNOWFLAKE_ACCOUNT }}
      DBT_USER:               ${{ secrets.DBT_USER }}
      PRIVATE_KEY:            ${{ secrets.PRIVATE_KEY }}
      PRIVATE_KEY_PASSPHRASE: ${{ secrets.PRIVATE_KEY_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv python install 3.13
      - run: uv sync
      - name: Install dbt profile
        run: |
          mkdir -p ~/.dbt
          cp airbnb/_profiles/profiles.yml ~/.dbt/profiles.yml
      - run: cd airbnb && uv run dbt deps
      - run: cd airbnb && uv run dbt build --target staging
      - uses: actions/upload-artifact@v4
        with:
          name: staging-target
          path: airbnb/target/
          retention-days: 90
