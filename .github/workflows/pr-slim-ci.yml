# ============================================================================
# NOT COURSEWARE — COURSEWARE DEVELOPMENT INFRASTRUCTURE
# This workflow is part of the courseware development/CI infrastructure and
# is NOT part of the bootcamp course material. Students should ignore it.
# It is intentionally gated to skip when running on the public courseware
# repository (nordquant/complete-dbt-bootcamp-zero-to-hero).
# ============================================================================
name: PR slim CI (defer to prod artifact)

on:
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read
  actions: read

jobs:
  slim-ci:
    name: Build modified with defer to prod artifact
    if: github.repository != 'nordquant/complete-dbt-bootcamp-zero-to-hero'
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_ACCOUNT:      "${{ secrets.SNOWFLAKE_ACCOUNT }}"
      DBT_USER:               "${{ secrets.DBT_USER }}"
      PRIVATE_KEY: |
        ${{ secrets.PRIVATE_KEY }}
      PRIVATE_KEY_PASSPHRASE: "${{ secrets.PRIVATE_KEY_PASSPHRASE }}"

    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv python install 3.13
      - run: uv sync
      - name: Set DBT_ENV_NAME from branch (uppercase, _ for / and -)
        run: |
          NAME="${{ github.head_ref }}"
          SANITIZED=$(echo "$NAME" | tr '/' '_' | tr '-' '_' | tr '[:lower:]' '[:upper:]')
          echo "DBT_ENV_NAME=$SANITIZED" >> "$GITHUB_ENV"
          echo "PR will build into schema: DBT_$SANITIZED"
      - run: cd airbnb && uv run dbt deps --profiles-dir _prod_profiles --target dev
      - name: Download latest prod-target artifact from main
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: prod-build.yml
          branch: main
          name: prod-target
          path: airbnb/prod-target
          if_no_artifact_found: fail
      - name: dbt build (slim CI if manifest available, else full)
        run: |
          cd airbnb
          uv run dbt build --profiles-dir _prod_profiles --target dev \
            --select state:modified+ --defer --state ./prod-target
