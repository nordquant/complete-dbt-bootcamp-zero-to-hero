name: PR slim CI (defer to staging artifact)

on:
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read
  actions: read

jobs:
  slim-ci:
    name: dbt build --select state:modified+ --defer
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_ACCOUNT:      ${{ secrets.SNOWFLAKE_ACCOUNT }}
      DBT_USER:               ${{ secrets.DBT_USER }}
      PRIVATE_KEY:            ${{ secrets.PRIVATE_KEY }}
      PRIVATE_KEY_PASSPHRASE: ${{ secrets.PRIVATE_KEY_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv python install 3.13
      - run: uv sync
      - name: Install dbt profile
        run: |
          mkdir -p ~/.dbt
          cp airbnb/_profiles/profiles.yml ~/.dbt/profiles.yml
      - name: Set DBT_ENV_NAME from branch (uppercase, _ for / and -)
        run: |
          NAME="${{ github.head_ref }}"
          SANITIZED=$(echo "$NAME" | tr '/' '_' | tr '-' '_' | tr '[:lower:]' '[:upper:]')
          echo "DBT_ENV_NAME=$SANITIZED" >> "$GITHUB_ENV"
          echo "PR will build into schema: DBT_$SANITIZED"
      - run: cd airbnb && uv run dbt deps
      - name: Download latest staging-target artifact from main
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: staging-build.yml
          branch: main
          name: staging-target
          path: airbnb/staging-target
          if_no_artifact_found: warn
      - name: dbt build (slim CI if manifest available, else full)
        run: |
          cd airbnb
          if [ -f staging-target/manifest.json ]; then
            echo "Found staging manifest — running slim CI with --defer to staging"
            uv run dbt build --select state:modified+ --defer --state ./staging-target --target dev
          else
            echo "No staging manifest yet — running full build for first PR"
            uv run dbt build --target dev
          fi
