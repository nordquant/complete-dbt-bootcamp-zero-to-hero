# Reference only
# Please go to https://github.com/zoltanctoth/dbt-reference-production-repo
# for a latest working example of this file

name: Prod deploy (on merge to main / manual)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  build:
    name: Production deps and build
    if: github.repository != 'nordquant/complete-dbt-bootcamp-zero-to-hero'
    runs-on: ubuntu-latest
    env:
      SNOWFLAKE_ACCOUNT:      "${{ secrets.SNOWFLAKE_ACCOUNT }}"
      DBT_USER:               "${{ secrets.DBT_USER }}"
      PRIVATE_KEY: |
        ${{ secrets.PRIVATE_KEY }}
      PRIVATE_KEY_PASSPHRASE: "${{ secrets.PRIVATE_KEY_PASSPHRASE }}"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - run: uv python install 3.13
      - run: uv sync
      - run: cd airbnb && uv run dbt deps --profiles-dir _prod_profiles --target prod
      - run: cd airbnb && uv run dbt build --profiles-dir _prod_profiles --target prod
      - name: Upload prod target as artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-target
          path: airbnb/target/
          retention-days: 90
