# ============================================================================
# NOT COURSEWARE — COURSEWARE DEVELOPMENT INFRASTRUCTURE
# This workflow is part of the courseware development/CI infrastructure and
# is NOT part of the bootcamp course material. Students should ignore it.
# ============================================================================
# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Test App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'  # 2 AM CET (1 AM UTC)

permissions:
  contents: read

# Full test configuration
# Default: Python 3.13 on ubuntu-latest
# For local act testing: act push ... --env run_full_tests=true
env:
  full_test_python: "3.13"
  full_test_runs_on: "ubuntu-latest"

jobs:
  build:
    if: github.repository == 'nordquant/complete-dbt-bootcamp-zero-to-hero'
    name: ${{ matrix.python-version == '3.13' && format('dbt full build ({0})', matrix.python-version) || format('dbt debug ({0})', matrix.python-version) }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        python-version: ["3.13", "3.12", "3.11", "3.10"]
        # runs-on: [ubuntu-latest, ubuntu-latest-arm64]
        runs-on: [ubuntu-latest]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
    - name: Determine if full tests should run
      id: check_full_tests
      run: |
        # run_full_tests can be overridden via act --env run_full_tests=true
        if [ -n "${run_full_tests:-}" ]; then
          echo "run_full_tests=$run_full_tests" >> $GITHUB_OUTPUT
        elif [ "${{ matrix.python-version }}" == "${{ env.full_test_python }}" ] && [ "${{ matrix.runs-on }}" == "${{ env.full_test_runs_on }}" ]; then
          echo "run_full_tests=true" >> $GITHUB_OUTPUT
        else
          echo "run_full_tests=false" >> $GITHUB_OUTPUT
        fi
    - name: Set dbt build options
      id: dbt_options
      run: |
        HEAD="${{ github.head_ref || github.ref_name }}"
        BASE="${{ github.base_ref }}"
        if [ "$HEAD" == "poweruser" ] || [ "$BASE" == "poweruser" ]; then
          echo "exclude=--exclude legacy_int_host_performance test_mart_listing_performance" >> $GITHUB_OUTPUT
        else
          echo "exclude=" >> $GITHUB_OUTPUT
        fi
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    - name: Install dependencies
      run: uv sync
    - name: Create dbt profile
      env:
        PROFILES_YML: ${{ secrets.PROFILES_YML }}
      run: |
        mkdir -p ~/.dbt
        echo "$PROFILES_YML" > ~/.dbt/profiles.yml
    - name: Execute dbt debug
      run: |
        cd airbnb
        uv run dbt debug
    - name: Install packages
      run: |
        cd airbnb
        uv run dbt deps
    - name: dbt build
      if: steps.check_full_tests.outputs.run_full_tests == 'true'
      run: |
        cd airbnb
        uv run dbt build ${{ steps.dbt_options.outputs.exclude }}
    - name: Test dbt inline commands
      if: steps.check_full_tests.outputs.run_full_tests == 'true'
      run: |
        cd airbnb
        uv run bash ../.github/scripts/test_commands.sh core
    - name: dbt docs generate
      if: steps.check_full_tests.outputs.run_full_tests == 'true'
      run: |
        cd airbnb
        uv run dbt docs generate
    - name: Install dbt fusion
      if: steps.check_full_tests.outputs.run_full_tests == 'true'
      env:
        SHELL: /bin/bash
      run: |
        curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sh -s -- --update
    - name: dbtf build (Fusion)
      if: steps.check_full_tests.outputs.run_full_tests == 'true'
      run: |
        cd airbnb
        ~/.local/bin/dbt build ${{ steps.dbt_options.outputs.exclude }}
    - name: Test dbt inline commands (Fusion)
      if: steps.check_full_tests.outputs.run_full_tests == 'true'
      run: |
        cd airbnb
        PATH="$HOME/.local/bin:$PATH" bash ../.github/scripts/test_commands.sh fusion

  windows-quote-test:
    if: github.repository == 'nordquant/complete-dbt-bootcamp-zero-to-hero' && github.event_name == 'workflow_dispatch'
    name: dbt inline quoting (Windows / ${{ matrix.shell }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        shell: [pwsh, powershell]   # PowerShell 7 and Windows PowerShell 5.1
    env:
      # Hardcoded to match the workflow-level full_test_python value above.
      # The `env` context is NOT available inside jobs.<id>.env, so we can't
      # write `${{ env.full_test_python }}` here — bump both together.
      UV_PYTHON: "3.13"
    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"
    - name: Set up Python 3.13
      run: uv python install 3.13
    - name: Install dependencies
      run: uv sync
    - name: Create dbt profile
      shell: bash
      env:
        PROFILES_YML: ${{ secrets.PROFILES_YML }}
      run: |
        mkdir -p ~/.dbt
        echo "$PROFILES_YML" > ~/.dbt/profiles.yml
    # NOTE: the step-level `shell:` key does NOT accept ${{ matrix.* }}
    # expressions — the parser rejects matrix context there and refuses to
    # load the whole workflow. We therefore duplicate each dbt step per
    # shell and gate with `if: matrix.shell == '...'`, the same pattern
    # used for the inline-quoting test steps below.
    - name: dbt debug (pwsh)
      if: matrix.shell == 'pwsh'
      shell: pwsh
      working-directory: airbnb
      run: uv run dbt debug
    - name: dbt debug (powershell)
      if: matrix.shell == 'powershell'
      shell: powershell
      working-directory: airbnb
      run: uv run dbt debug
    - name: dbt deps (pwsh)
      if: matrix.shell == 'pwsh'
      shell: pwsh
      working-directory: airbnb
      run: uv run dbt deps
    - name: dbt deps (powershell)
      if: matrix.shell == 'powershell'
      shell: powershell
      working-directory: airbnb
      run: uv run dbt deps
    - name: dbt build (pwsh)
      if: matrix.shell == 'pwsh'
      shell: pwsh
      working-directory: airbnb
      run: uv run dbt build
    - name: dbt build (powershell)
      if: matrix.shell == 'powershell'
      shell: powershell
      working-directory: airbnb
      run: uv run dbt build
    - name: Inline command quoting tests (pwsh cell)
      if: matrix.shell == 'pwsh'
      shell: pwsh
      working-directory: airbnb
      run: uv run pwsh -File ../.github/scripts/test_commands.ps1
    - name: Inline command quoting tests (powershell cell)
      if: matrix.shell == 'powershell'
      shell: powershell
      working-directory: airbnb
      run: uv run powershell -File ../.github/scripts/test_commands.ps1

  block-poweruser-to-main:
    if: github.event_name == 'pull_request' && github.head_ref == 'poweruser' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
    - name: Block merge
      run: |
        echo "::error::PRs from poweruser to main are not allowed. Only main → poweruser merges are permitted."
        exit 1
